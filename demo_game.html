<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" user-scalable="no" />
    <title>🏞️ GERALT · SIDE RUNNER</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: #0b1a1f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px 10px;
            font-family: 'Segoe UI', 'Consolas', monospace;
        }

        .game-container {
            background: #1e3a3f;
            padding: 20px 20px 25px;
            border-radius: 32px;
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.6);
            border: 1px solid #5f9b9e;
        }

        canvas {
            border: none;
            border-radius: 20px;
            background-color: #aad0d5;
            /* fallback */
            box-shadow: inset 0 0 0 2px #2e5a5f, 0 8px 0 #0e2a2e;
            display: block;
            margin: 0 auto;
            width: 100%;
            max-width: 480px;
            height: auto;
            image-rendering: crisp-edges;
            /* pixel style */
        }

        .control-panel {
            text-align: center;
            width: 100%;
            max-width: 480px;
            margin-top: 18px;
        }

        .button-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 6px 0;
        }

        .ctrl-btn {
            background: #2e4c42;
            border: none;
            border-bottom: 5px solid #14211c;
            color: #f3e9c0;
            font-weight: bold;
            font-size: 1.3rem;
            padding: 10px 22px;
            min-width: 80px;
            border-radius: 60px;
            box-shadow: 0 4px 0 #0e1e18, 0 6px 8px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            font-family: 'Consolas', monospace;
            letter-spacing: 1px;
            transition: all 0.04s ease;
            touch-action: manipulation;
            user-select: none;
        }

        .ctrl-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #0e1e18, 0 4px 8px rgba(0, 0, 0, 0.3);
            border-bottom-width: 2px;
        }

        .special-btn {
            background: #6a4e39;
            border-bottom-color: #3a2b1f;
            color: #ffecb3;
        }

        .info-text {
            color: #cbdad5;
            margin: 16px 0 6px;
            font-size: 0.95rem;
            font-style: italic;
            text-shadow: 2px 2px 0 #14211c;
        }

        .info-text strong {
            color: #fdd38e;
        }

        /* Placeholder styling for missing images — game still runs with graceful fallback */
    </style>
</head>

<body onload="startGame()">
    <script>

        var myGamePiece, blueGamePiece, yellowGamePiece;
        var redGamePiece;
        var myObstacles = [];
        var myScore;
        var myBackground;
        var mySound;
        var myMusic;


        function startGame() {
            myGamePiece = new component(30, 30, "images/geralt.png", 10, 120, "image");
            myBackground = new component(656, 270, "images/fengjing.jpg", 0, 0, "background");
            mySound = new sound("sound/bounce.mp3");
            myMusic = new sound("sound/music.mp3");
            myMusic.play();

            redGamePiece = new component(30, 30, "red", 80, 75, "square");
            blueGamePiece = new component(30, 30, "rgba(0, 0, 255, 0.5)", 100, 120, "flyingSquare");
            yellowGamePiece = new component(30, 30, "rgba(255, 255, 0, 0.5)", 160, 120);
            myScore = new component("30px", "Consolas", "black", 280, 40, "text");
            myGameArea.start();
        }

        var myGameArea = {
            canvas: document.createElement("canvas"),
            start: function () {
                this.canvas.width = 480;
                this.canvas.height = 270;
                this.context = this.canvas.getContext("2d");
                document.body.insertBefore(this.canvas, document.body.childNodes[0]);
                this.frameNo = 0;
                this.interval = setInterval(updateGameArea, 20);
                window.addEventListener('keydown', function (e) {
                    myGameArea.keys = (myGameArea.keys || []);
                    myGameArea.keys[e.keyCode] = true;
                })
                window.addEventListener('keyup', function (e) {
                    myGameArea.keys[e.keyCode] = false;
                })
            },
            clear: function () {
                this.context.clearRect(0, 0, this.canvas.width, this.canvas.height);
            },
            stop: function () {
                clearInterval(this.interval);
            }
        }
        function everyinterval(n) {
            if ((myGameArea.frameNo / n) % 1 == 0) { return true; }
            return false;
        }

        function accelerate(n) {
            myGamePiece.gravity = n;
        }




        function component(width, height, color, x, y, type) {
            this.type = type;

            if (type == "image" || type == "background") {
                this.image = new Image();
                this.image.src = color;
            }
            this.width = width;
            this.height = height;
            this.speedX = 0;
            this.speedY = 0;
            this.x = x;
            this.y = y;
            this.gravity = 0.05;
            this.gravitySpeed = 0;
            this.bounce = 0.6;

            // Initialize ALL angle-related properties
            this.spinAngle = 0;       // Changed: capital A, consistent
            this.orbitAngle = 0;      // Capital A
            this.moveAngle = 1;       // Speed of orbit
            this.spinSpeed = 2;       // ADDED: Speed of rotation
            this.speed = 2;           // ADDED: Orbital movement speed

            this.update = function () {
                ctx = myGameArea.context;
                if (type == "image" || type == "background") {
                    ctx.drawImage(this.image, this.x, this.y, this.width, this.height);
                    if (type == "background") {
                        ctx.drawImage(this.image, this.x + this.width, this.y, this.width, this.height);
                    }
                }
                else if (type == "square") {

                    ctx.save();
                    ctx.translate(this.x + this.width / 2, this.y + this.height / 2);  // Rotate around CENTER
                    ctx.rotate(this.spinAngle);
                    ctx.fillStyle = color;
                    ctx.fillRect(-this.width / 2, -this.height / 2, this.width, this.height);
                    ctx.restore();
                }
                else if (this.type == "flyingSquare") {

                    ctx.save();
                    ctx.translate(this.x + this.width / 2, this.y + this.height / 2);
                    ctx.rotate(this.spinAngle);
                    ctx.fillStyle = color;
                    ctx.fillRect(-this.width / 2, -this.height / 2, this.width, this.height);
                    ctx.restore();
                }
                else {
                    ctx.fillStyle = color;
                    ctx.fillRect(this.x, this.y, this.width, this.height);
                }
            }

            this.newPos = function () {
                this.gravitySpeed += this.gravity;
                this.x += this.speedX;
                this.y += this.speedY + this.gravitySpeed;
                this.hitBottom();
                if (this.type == "background") {
                    if (this.x == -(this.width)) {
                        this.x = 0;
                    }
                } else if (this.type == "flyingSquare") {
                    this.orbitAngle += this.moveAngle * Math.PI / 180;
                    this.spinAngle += this.spinSpeed * Math.PI / 180;
                    this.x += this.speed * Math.sin(this.orbitAngle);
                    this.y -= this.speed * Math.cos(this.orbitAngle);
                }
            }
            this.hitBottom = function () {
                var rockbottom = myGameArea.canvas.height - this.height;
                if (this.y > rockbottom) {
                    this.y = rockbottom;
                    this.gravitySpeed = -(this.gravitySpeed * this.bounce);
                }
            }

            this.crashWith = function (otherobj) {
                var myleft = this.x;
                var myright = this.x + (this.width);
                var mytop = this.y;
                var mybottom = this.y + (this.height);
                var otherleft = otherobj.x;
                var otherright = otherobj.x + (otherobj.width);
                var othertop = otherobj.y;
                var otherbottom = otherobj.y + (otherobj.height);
                var crash = true;
                if ((mybottom < othertop) ||
                    (mytop > otherbottom) ||
                    (myright < otherleft) ||
                    (myleft > otherright)) {
                    crash = false;
                }
                return crash;
            }

        }
        function sound(src) {
            this.sound = document.createElement("audio");
            this.sound.src = src;
            this.sound.setAttribute("preload", "auto");
            this.sound.setAttribute("controls", "none");
            this.sound.style.display = "none";
            document.body.appendChild(this.sound);
            this.play = function () {
                this.sound.play();
            }
            this.stop = function () {
                this.sound.pause();
            }
        }
        function updateGameArea() {
            var x, y;
            for (i = 0; i < myObstacles.length; i += 1) {
                if (myGamePiece.crashWith(myObstacles[i])) {
                    mySound.play();
                    myGameArea.stop();
                    return;
                }
            }
            myGameArea.clear();


            myBackground.speedX = -1;
            myBackground.newPos();
            myBackground.update();

            myGameArea.frameNo += 1;
            if (myGameArea.frameNo == 1 || everyinterval(150)) {
                x = myGameArea.canvas.width;
                minHeight = 20;
                maxHeight = 200;
                height = Math.floor(Math.random() * (maxHeight - minHeight + 1) + minHeight);
                minGap = 50;
                maxGap = 200;
                gap = Math.floor(Math.random() * (maxGap - minGap + 1) + minGap);
                myObstacles.push(new component(10, height, "green", x, 0));
                myObstacles.push(new component(10, height, "green", x, height + gap));
            }
            for (i = 0; i < myObstacles.length; i += 1) {
                myObstacles[i].x += -1;
                myObstacles[i].update();
            }
            if (myGameArea.keys && myGameArea.keys[37]) { myGamePiece.speedX = -1; }
            if (myGameArea.keys && myGameArea.keys[39]) { myGamePiece.speedX = 1; }
            if (myGameArea.keys && myGameArea.keys[38]) { myGamePiece.speedY = -1; }
            if (myGameArea.keys && myGameArea.keys[40]) { myGamePiece.speedY = 1; }

            myScore.text = "SCORE: " + myGameArea.frameNo;
            myScore.update();
            myGamePiece.newPos();
            myGamePiece.update();
            redGamePiece.spinAngle += 1 * Math.PI / 180;
            redGamePiece.x += 1;
            redGamePiece.update();
            yellowGamePiece.x += 1;
            yellowGamePiece.y -= 1;
            yellowGamePiece.update();
            blueGamePiece.newPos();
            blueGamePiece.update();
        }
        function move(dir) {
            myGamePiece.image.src = "images/geralt.png";
            if (dir == "up") { myGamePiece.speedY = -1; }
            if (dir == "down") { myGamePiece.speedY = 1; }
            if (dir == "left") { myGamePiece.speedX = -1; }
            if (dir == "right") { myGamePiece.speedX = 1; }
        }
        function clearmove() {
            myGamePiece.image.src = "images/star.jpg";
            myGamePiece.speedX = 0;
            myGamePiece.speedY = 0;
        }
    </script>
    <div style="text-align:center;width:480px;">
        <button onmousedown="move('up')" onmouseup="clearmove()" ontouchstart="move('up')">UP</button><br><br>
        <button onmousedown="move('left')" onmouseup="clearmove()" ontouchstart="move('left')">LEFT</button>
        <button onmousedown="move('right')" onmouseup="clearmove()" ontouchstart="move('right')">RIGHT</button><br><br>
        <button onmousedown="move('down')" onmouseup="clearmove()" ontouchstart="move('down')">DOWN</button>
        <button onmousedown="accelerate(-0.2)" onmouseup="accelerate(0.1)">ACCELERATE</button>
    </div>
    <p>The red square moves one pixel to the right, 50 times per second.</p>

</body>

</html>
