<!DOCTYPE html>
<html>

<head>
    <title> Drive Visual Map</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            background-color: #f8f9fa;
        }

        ul {
            list-style-type: none;
            padding-left: 20px;
        }

        .folder {
            cursor: pointer;
            font-weight: bold;
            color: #1a73e8;
            margin: 5px 0;
            user-select: none;
        }

        .folder::before {
            content: "📁 ";
        }

        .file {
            margin: 5px 0;
            color: #5f6368;
        }

        .file::before {
            content: "📄 ";
        }

        .nested {
            display: none;
        }

        .active {
            display: block;
        }
    </style>
</head>

<body>
    <h2> Drive Example Map</h2>
    <p><i>Note: Click on active folders to expand/collapse them.</i></p>
    <p><i>Hope this can be helpful for you</i></p>

    <!--  Only the container is retained in the HTML. -->
    <div id="folder-tree-container">
        <!-- Dynamically rendered from external JSON by JS -->
    </div>

    <script src="script/render.js"></script>

</body>

</html>




</html>
