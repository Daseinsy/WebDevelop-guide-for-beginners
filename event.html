<!DOCTYPE html>
<html lang="en-us">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Optimized version</title>
    <link rel="stylesheet" href="css/style_form.css">
   
</head>

<body>
    <fieldset oninput="x.value=parseInt(a.value)+parseInt(b.value)">
        <legend>👤</legend>
        <div id="result"></div>

        <input list="names" id="1" name="username">
        <datalist id="names">
            <option value="Edge">
            <option value="Firefox">
            <option value="Chrome">
            <option value="Opera">
            <option value="Safari">
        </datalist>
        <input type="url" id="homepage" name="homepage" placeholder="Please input your URL">
        <label for="pwd">Password:</label>
        <input type="password" id="pwd" name="pwd" minlength="6" maxlength="14">
        <label for="email">Enter your email:</label>
        <input type="email" id="email" name="email">
        <label for="phone">Enter a phone number: </label><br><br>
        <input type="tel" id="phone" name="phone" placeholder="123-45-678" pattern="[0-9]{3}-[0-9]{2}-[0-9]{3}"
            required>
        <label for="quantity">Enter quantity in 0-100:</label>
        <input type="number" id="quantity" name="quantity" min="0" max="100" value="0" readonly>
        <input type="range" id="a" name="a" value="50">
        (0~100) +
        <input type="number" id="b" name="b" value="50">
        =
        <output name="x" for="a b"></output>&nbsp;&nbsp;
        <input type="color" id="favcolor" name="favcolor" style="all:revert;width: 100px; height: 30px;"><br />

        <button onclick="clickCounter()" type="button">Click me!</button>
        <p id="result1"></p>

        <h1>Web Worker API</h1>
       <p>Count numbers: <output id="result2"></output></p>
        <button onclick="startWorker()">Start Worker</button>
        <button onclick="stopWorker()">Stop Worker</button>
        
        <h1>Getting Server Updates</h1>
        <div id="result3"></div>

        <input type="file" id="files" name="files" multiple>
        <input type="reset" value="Reset">

         <script src="script/script_api.js"></script>
    </fieldset>

</body>

</html>
